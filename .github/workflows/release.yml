name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Needed because the brews: publish step pushes to a *different*
          # repo (homebrew-infraward) than the one this workflow runs in;
          # the default GITHUB_TOKEN is scoped only to this repo. Must be a
          # PAT (fine-grained, contents:write on homebrew-infraward is
          # enough) added as a repo secret. Not yet set -- until it is, the
          # brews publish step will fail (unverified whether that fails the
          # whole `goreleaser release` run or just that step; the GitHub
          # Release/binaries are uploaded in an earlier step regardless).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
